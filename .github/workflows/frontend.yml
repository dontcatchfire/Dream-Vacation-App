name: Dream Vacation App Frontend CI

on:
  push: # the push event on the main branch will trigger the workflow to start
    branches: 
      - main
    paths:
      - frontend/**
      - .github/workflows/frontend.yml
  pull_request: # also a pull request event to the main or dev branches will trigger the workflow to start
    branches: 
      - main
      - dev
    paths:
      - frontend/**
      - .github/workflows/frontend.yml
  workflow_dispatch:

# 1. Building frontend Docker image

jobs:
  build-and-push:
    name: Frontend build
    runs-on: ubuntu-latest

    defaults: 
      run: 
        working-directory: frontend

    steps:
      - name: Checking out frontend code # this pulls the frontend code into the ubuntu runner
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with: 
          node-version: 16
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/dreamfrontend:${{ github.sha }} .

      - name: Login to Docker Hub # 2. Pushing frontend Docker image to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        
      # - name: Push frontend Docker image 
      #   run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/dreamfrontend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with: 
          context: ./frontend
          push: true
          tags: | 
            dontcatchfire/dreamfrontend:${{ github.sha }}
            dontcatchfire/dreamfrontend:latest

