name: Dream Vacation App Backend CI

on:
  push:
    branches:
      - main
    paths:
      - backend/**
      - .github/workflows/backend.yml

  pull_request: # also a pull request event to the main or dev branches will trigger the workflow to start
    branches: 
      - main
      - dev
    paths:
      - backend/**
      - .github/workflows/backend.yml

  workflow_dispatch:


jobs:

  build-job:
    name: Backend build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checking out backend code # pulling backend code into ubuntu runner
        uses: actions/checkout@v4

      - name: Setup Node.js  
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/dreambackend:${{ github.sha }} .


  push-job:

    name: Backend push to Dockerhub
    needs: build-job

    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checking out backend code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/dreambackend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/dreambackend:latest