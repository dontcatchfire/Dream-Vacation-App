services:

  frontend:
    image: dontcatchfire/dreamfrontend:latest
    container_name: dva_frontend
    ports:
      - "8080:80"
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - dva_network

  backend:
    image: dontcatchfire/dreambackend:latest
    container_name: dva_backend
    ports:
      - "3001:3001"
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - dva_network  

  db:
    image: postgres:16-alpine
    restart: always
    container_name: dva_database
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dva_network

volumes:
  postgres_data:

networks:
  dva_network:
    driver: bridge